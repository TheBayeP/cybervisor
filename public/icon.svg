<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0369a1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="eyeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Shield body -->
  <path d="M256 28L60 130v152c0 120 84 210 196 230 112-20 196-110 196-230V130L256 28z" fill="url(#shieldGrad)" opacity="0.15" stroke="url(#shieldGrad)" stroke-width="8"/>
  <path d="M256 58L90 145v137c0 100 72 180 166 198 94-18 166-98 166-198V145L256 58z" fill="none" stroke="url(#shieldGrad)" stroke-width="4" opacity="0.4"/>
  <!-- Cyber eye -->
  <ellipse cx="256" cy="256" rx="110" ry="65" fill="none" stroke="url(#eyeGrad)" stroke-width="6" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="32" fill="url(#eyeGrad)" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="12" fill="#082f49"/>
  <!-- Scan lines -->
  <line x1="256" y1="170" x2="256" y2="342" stroke="#38bdf8" stroke-width="1.5" opacity="0.3"/>
  <line x1="146" y1="256" x2="366" y2="256" stroke="#38bdf8" stroke-width="1.5" opacity="0.3"/>
  <!-- Corner brackets -->
  <path d="M120 100L120 140" stroke="#0ea5e9" stroke-width="3" opacity="0.6"/>
  <path d="M100 120L140 120" stroke="#0ea5e9" stroke-width="3" opacity="0.6"/>
  <path d="M392 100L392 140" stroke="#0ea5e9" stroke-width="3" opacity="0.6"/>
  <path d="M372 120L412 120" stroke="#0ea5e9" stroke-width="3" opacity="0.6"/>
  <path d="M120 412L120 372" stroke="#0ea5e9" stroke-width="3" opacity="0.6"/>
  <path d="M100 392L140 392" stroke="#0ea5e9" stroke-width="3" opacity="0.6"/>
  <path d="M392 412L392 372" stroke="#0ea5e9" stroke-width="3" opacity="0.6"/>
  <path d="M372 392L412 392" stroke="#0ea5e9" stroke-width="3" opacity="0.6"/>
  <!-- Pulse rings -->
  <circle cx="256" cy="256" r="140" fill="none" stroke="#0ea5e9" stroke-width="1" opacity="0.2">
    <animate attributeName="r" from="130" to="170" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" from="0.3" to="0" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="256" cy="256" r="160" fill="none" stroke="#0ea5e9" stroke-width="1" opacity="0.15">
    <animate attributeName="r" from="155" to="195" dur="3s" begin="1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" from="0.2" to="0" dur="3s" begin="1s" repeatCount="indefinite"/>
  </circle>
</svg>
